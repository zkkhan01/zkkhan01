  <text x="852" y="25" text-anchor="end" font-size="11" fill="#33486B">tty1</text>

  <!-- boot log -->
  <g font-size="12" xml:space="preserve">
    <text x="34" y="64" opacity="0" fill="#5C7291">[ <tspan fill="#4ADE80">OK</tspan> ] mounting /dev/skills · loading threat feeds · initializing agents<animate attributeName="opacity" begin="0.1s" dur="0.15s" to="1" fill="freeze"/></text>
    <text x="34" y="84" opacity="0" fill="#5C7291">[ <tspan fill="#4ADE80">OK</tspan> ] handshake with github.com/zkkhan01 ... identity verified<animate attributeName="opacity" begin="0.6s" dur="0.15s" to="1" fill="freeze"/></text>
    <text x="34" y="104" opacity="0" fill="#5C7291">[ <tspan fill="#E8B44F">**</tspan> ] rendering operator profile ▾<animate attributeName="opacity" begin="1.1s" dur="0.15s" to="1" fill="freeze"/></text>
  </g>

  <!-- ASCII name: reveal, then continuous shimmer -->
  <g opacity="0">
    <animate attributeName="opacity" begin="1.5s" dur="0.06s" to="1" fill="freeze"/>
    <!-- flicker-in -->
    <animate attributeName="opacity" begin="1.56s" dur="0.5s" values="1;0.2;1;0.35;1" calcMode="discrete" fill="freeze"/>
    <use href="#nameArt" xlink:href="#nameArt" fill="#241A06" transform="translate(4,5)"/>
    <use href="#nameArt" xlink:href="#nameArt" fill="url(#shimmer)"/>
    <!-- glitch slices: brief horizontal displacement, repeating rarely -->
    <g clip-path="url(#glitchTop)">
      <use href="#nameArt" xlink:href="#nameArt" fill="#E8B44F" opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" dur="0.18s" begin="6s;13s;21s" />
        <animateTransform attributeName="transform" type="translate" values="0 0;7 0;-5 0;0 0" dur="0.18s" begin="6s;13s;21s"/>
      </use>
    </g>
    <g clip-path="url(#glitchBottom)">
      <use href="#nameArt" xlink:href="#nameArt" fill="#7FB4FF" opacity="0">
        <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.5;1" dur="0.18s" begin="6.05s;13.05s;21.05s"/>
        <animateTransform attributeName="transform" type="translate" values="0 0;-8 0;5 0;0 0" dur="0.18s" begin="6.05s;13.05s;21.05s"/>
      </use>
    </g>
  </g>

  <!-- subtitle rule -->
  <g opacity="0">
    <animate attributeName="opacity" begin="2.6s" dur="0.5s" to="1" fill="freeze"/>
    <text x="70" y="254" font-size="13" fill="#5C7291" xml:space="preserve">──────  cybersecurity · software engineering · ai systems  ──────  chicago, il  ──────</text>
  </g>

  <!-- typed command -->
  <text x="46" y="311" font-size="14" fill="#4ADE80" opacity="0">$<animate attributeName="opacity" begin="4.2s" dur="0.1s" to="1" fill="freeze"/></text>
  <g clip-path="url(#typeClip)">
    <text x="66" y="311" font-size="14" fill="#E9E4D6" xml:space="preserve">whoami --verbose</text>
  </g>

  <!-- command output -->
  <g opacity="0">
    <animate attributeName="opacity" begin="5.9s" dur="0.4s" to="1" fill="freeze"/>
    <text x="66" y="338" font-size="13" fill="#8FA3BF" xml:space="preserve">B.S. Cybersecurity @ DePaul · CS minor · class of 2027 · 50+ certifications</text>
    <text x="66" y="358" font-size="13" fill="#8FA3BF" xml:space="preserve">builds: threat intel platforms · AI agents · production client systems</text>
  </g>
  <!-- cursor blink via overlay mask on the tspan block: simpler separate rect -->
  <rect x="66" y="346" width="9" height="15" fill="#E8B44F" opacity="0">
    <animate attributeName="opacity" begin="6.3s" dur="1.1s" values="0;1;1;0;0" keyTimes="0;0.05;0.5;0.55;1" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" begin="5.9s" dur="0.05s" from="0 0" to="562 0" fill="freeze"/>
  </rect>

