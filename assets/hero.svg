  <g opacity="0">
    <animate attributeName="opacity" begin="6.4s" dur="0.5s" to="1" fill="freeze"/>
    <rect x="1.5" y="372" width="877" height="26.5" fill="#0C1930"/>
    <path d="M1.5 372 h877 v14 a12 12 0 0 1 -12 12 h-853 a12 12 0 0 1 -12 -12 z" fill="#0C1930"/>
    <circle cx="34" cy="385" r="4" fill="#4ADE80">
      <animate attributeName="opacity" values="1;0.25;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="48" y="389" font-size="11" fill="#5C7291" xml:space="preserve">SYSTEMS NOMINAL</text>
    <text x="440" y="389" text-anchor="middle" font-size="11" fill="#33486B" xml:space="preserve">zainkkhan.vercel.app</text>
    <text x="846" y="389" text-anchor="end" font-size="11" fill="#5C7291" xml:space="preserve">UPTIME <tspan fill="#E8B44F">since 2023</tspan> · 41.88°N 87.63°W</text>
  </g>
