  <!-- panel -->
  <rect x="1.5" y="1.5" width="877" height="397" rx="12" fill="#081120" stroke="#1B2C47" stroke-width="1.5"/>
  <rect x="1.5" y="1.5" width="877" height="200" rx="12" fill="url(#glare)"/>

  <g clip-path="url(#panelClip)">
    <!-- glyph rain columns, faint, behind everything -->
    <g font-size="11" fill="#16294A" xml:space="preserve" opacity="0.9">
      <text x="120" y="0">1<tspan x="120" dy="14">0</tspan><tspan x="120" dy="14">x</tspan><tspan x="120" dy="14">7</tspan><tspan x="120" dy="14">f</tspan><tspan x="120" dy="14">1</tspan><tspan x="120" dy="14">0</tspan>
        <animateTransform attributeName="transform" type="translate" values="0 -100; 0 500" dur="9s" repeatCount="indefinite"/></text>
      <text x="300" y="0">0<tspan x="300" dy="14">1</tspan><tspan x="300" dy="14">a</tspan><tspan x="300" dy="14">e</tspan><tspan x="300" dy="14">0</tspan><tspan x="300" dy="14">1</tspan>
        <animateTransform attributeName="transform" type="translate" values="0 -160; 0 500" dur="12s" begin="-4s" repeatCount="indefinite"/></text>
      <text x="480" y="0">f<tspan x="480" dy="14">0</tspan><tspan x="480" dy="14">1</tspan><tspan x="480" dy="14">c</tspan><tspan x="480" dy="14">3</tspan><tspan x="480" dy="14">0</tspan><tspan x="480" dy="14">1</tspan>
        <animateTransform attributeName="transform" type="translate" values="0 -120; 0 500" dur="10.5s" begin="-7s" repeatCount="indefinite"/></text>
      <text x="660" y="0">1<tspan x="660" dy="14">1</tspan><tspan x="660" dy="14">0</tspan><tspan x="660" dy="14">d</tspan><tspan x="660" dy="14">4</tspan><tspan x="660" dy="14">0</tspan>
        <animateTransform attributeName="transform" type="translate" values="0 -140; 0 500" dur="8s" begin="-2s" repeatCount="indefinite"/></text>
      <text x="810" y="0">0<tspan x="810" dy="14">x</tspan><tspan x="810" dy="14">9</tspan><tspan x="810" dy="14">b</tspan><tspan x="810" dy="14">0</tspan>
        <animateTransform attributeName="transform" type="translate" values="0 -180; 0 500" dur="13s" begin="-9s" repeatCount="indefinite"/></text>
    </g>

    <!-- faint scanlines -->
    <g stroke="#0E1D33" stroke-width="1">
      <line x1="2" y1="120" x2="878" y2="120"/><line x1="2" y1="160" x2="878" y2="160"/>
      <line x1="2" y1="200" x2="878" y2="200"/><line x1="2" y1="240" x2="878" y2="240"/>
    </g>

    <!-- CRT sweep -->
    <rect x="2" y="-60" width="876" height="46" fill="#E9E4D6" opacity="0.025">
      <animate attributeName="y" values="-60;400" dur="7s" repeatCount="indefinite"/>
