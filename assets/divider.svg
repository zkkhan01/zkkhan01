<svg xmlns="http://www.w3.org/2000/svg" width="880" height="44" viewBox="0 0 880 44" font-family="'JetBrains Mono','Fira Code',Consolas,Menlo,monospace">
  <!-- endpoints -->
  <text x="10" y="27" font-size="13" fill="#5C7291" xml:space="preserve">[<tspan fill="#4ADE80">●</tspan>]</text>
  <text x="842" y="27" font-size="13" fill="#5C7291" xml:space="preserve">[<tspan fill="#4ADE80">●</tspan>]</text>

  <!-- link -->
  <line x1="44" y1="22" x2="836" y2="22" stroke="#1B2C47" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- packet travelling -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="44 0; 796 0; 44 0" keyTimes="0;0.5;1" dur="6s" repeatCount="indefinite"/>
    <rect x="0" y="16" width="26" height="12" rx="2" fill="#E8B44F"/>
    <rect x="-14" y="20" width="10" height="4" rx="2" fill="#E8B44F" opacity="0.45"/>
    <rect x="-24" y="21" width="6" height="2" rx="1" fill="#E8B44F" opacity="0.2"/>
  </g>

  <!-- ack pulse on endpoints -->
  <circle cx="20" cy="22" r="10" fill="none" stroke="#4ADE80" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.1;1" dur="6s" begin="5.6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="6;14" dur="0.8s" begin="5.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="846" cy="22" r="10" fill="none" stroke="#4ADE80" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.1;1" dur="6s" begin="2.6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="6;14" dur="0.8s" begin="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>
